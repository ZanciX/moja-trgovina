<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja prva stran</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
            text-align: center;
            color: #1a1a1a;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.125rem;
            color: #555;
            margin-bottom: 32px;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <h1>Moja prva stran</h1>
    <p>Testna stran za mojo trgovino</p>
    <button onclick="alert('Deluje!')">Deluje!</button>
</body>
</html>
